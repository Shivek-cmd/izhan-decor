<style>
  .site-header {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.95);
    border-bottom: 1px solid var(--color-border);
    backdrop-filter: blur(14px);
  }

  .site-header__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 88px;
  }

  .site-header__brand {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
  }

  .site-header__logo {
    width: 84px;
    height: 84px;
    object-fit: contain;
  }

  .site-header__brand-name {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }

  .site-header__brand-name strong {
    font-family: var(--font-serif);
    font-size: var(--text-lg);
    font-weight: 700;
    color: var(--color-dark);
    letter-spacing: 0.01em;
  }

  .site-header__brand-name span {
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--color-accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Desktop nav ───────────────────────────────────────── */
  .site-header__nav {
    display: flex;
    align-items: center;
    gap: clamp(1.5rem, 2.5vw, 2.25rem);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--color-dark);
  }

  .site-header__nav a {
    position: relative;
    padding-block: 0.35rem;
    color: var(--color-dark);
    transition: color var(--ease);
  }

  .site-header__nav a::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2px;
    background: var(--color-primary);
    border-radius: var(--radius-full);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform var(--ease);
  }

  .site-header__nav a:hover,
  .site-header__nav a.is-active { color: var(--color-primary); }

  .site-header__nav a:hover::after,
  .site-header__nav a.is-active::after { transform: scaleX(1); }

  /* ── Desktop CTA ───────────────────────────────────────── */
  .site-header__actions {
    display: flex;
    align-items: center;
    gap: 0.625rem;
  }

  .site-header__cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 0.65rem 1.4rem;
    border: 2px solid var(--color-primary);
    border-radius: var(--radius-full);
    background: var(--color-primary);
    color: var(--color-surface);
    font-size: var(--text-sm);
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: background var(--ease), border-color var(--ease), transform var(--ease), box-shadow var(--ease);
  }

  .site-header__cta:hover {
    background: var(--color-primary-hover);
    border-color: var(--color-primary-hover);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  /* ── Hamburger button ──────────────────────────────────── */
  .site-header__menu {
    display: none;
    width: 2.75rem;
    height: 2.75rem;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    color: var(--color-dark);
    background: var(--color-surface-soft);
    transition: background var(--ease);
    flex-shrink: 0;
  }

  .site-header__menu:hover { background: var(--color-primary-soft); }

  .site-header__menu-icon,
  .site-header__menu-icon::before,
  .site-header__menu-icon::after {
    display: block;
    width: 1.25rem;
    height: 2px;
    border-radius: var(--radius-full);
    background: currentColor;
    transition: transform var(--ease), opacity var(--ease);
  }

  .site-header__menu-icon {
    position: relative;
  }

  .site-header__menu-icon::before,
  .site-header__menu-icon::after {
    content: "";
    position: absolute;
    left: 0;
  }

  .site-header__menu-icon::before { top: -0.4rem; }
  .site-header__menu-icon::after  { top:  0.4rem; }

  .site-header.is-open .site-header__menu-icon        { transform: rotate(45deg); }
  .site-header.is-open .site-header__menu-icon::before { opacity: 0; }
  .site-header.is-open .site-header__menu-icon::after  { transform: translateY(-0.4rem) rotate(-90deg); }

  /* ── Mobile slide-down panel ───────────────────────────── */
  .site-header__panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    background: var(--color-dark);
    border-top: 1px solid rgba(255, 255, 255, 0.07);
  }

  .site-header__panel-nav {
    display: flex;
    flex-direction: column;
    padding-block: 0.5rem;
  }

  .site-header__panel-nav a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    color: rgba(255, 255, 255, 0.72);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    transition: color var(--ease), background var(--ease), padding-left var(--ease);
  }

  .site-header__panel-nav a:last-child {
    border-bottom: none;
  }

  .site-header__panel-nav a:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
    padding-left: 1.875rem;
  }

  .site-header__panel-nav a.is-active {
    color: var(--color-accent);
    background: rgba(201, 151, 90, 0.07);
  }

  /* Arrow chevron per link */
  .site-header__panel-nav a svg {
    width: 1rem;
    height: 1rem;
    opacity: 0.4;
    transition: opacity var(--ease), transform var(--ease);
    flex-shrink: 0;
  }

  .site-header__panel-nav a:hover svg,
  .site-header__panel-nav a.is-active svg {
    opacity: 1;
    transform: translateX(3px);
    color: var(--color-accent);
  }

  /* CTA block at bottom of panel */
  .site-header__panel-cta {
    padding: 1.25rem 1.5rem 1.75rem;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }

  .site-header__panel-cta a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0.9rem 1.5rem;
    border-radius: var(--radius-md);
    background: var(--color-accent);
    color: #fff;
    font-size: var(--text-base);
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: background var(--ease), transform var(--ease);
  }

  .site-header__panel-cta a:hover {
    background: var(--color-accent-hover);
    transform: translateY(-1px);
  }

  /* ── Responsive ────────────────────────────────────────── */
  @media (max-width: 900px) {
    .site-header__nav,
    .site-header__actions {
      display: none;
    }

    .site-header__menu {
      display: inline-flex;
    }

    .site-header.is-open .site-header__panel {
      max-height: 480px;
    }
  }
</style>

<header class="site-header" data-site-header>
  <div class="container site-header__inner">

    <a class="site-header__brand" href="https://sites.leadconnectorhq.com/preview/ZRjI0b0dRrtS1rWmfXck">
      <img class="site-header__logo" src="https://assets.cdn.filesafe.space/pDreylt0DE2IrmVNC9Mn/media/6a2c3a0c16651db7bf0e846b.png" alt="Izhaan Decor Inc">
      <div class="site-header__brand-name">
        <strong>Izhaan Decor</strong>
        <span>Window Coverings</span>
      </div>
    </a>

    <nav class="site-header__nav" aria-label="Primary navigation">
      <a href="https://sites.leadconnectorhq.com/preview/ZRjI0b0dRrtS1rWmfXck">Home</a>
      <a href="https://sites.leadconnectorhq.com/preview/7Khaj4g1PF6rklNUDMKk">About</a>
      <a href="https://sites.leadconnectorhq.com/preview/RR3e8lpguyVaawDedxJ2">Services</a>
      <a href="https://sites.leadconnectorhq.com/preview/Yfsl5wGaeXydse247kvx">Gallery</a>
      <a href="https://sites.leadconnectorhq.com/preview/1hKUnDgy89s5HG7MLgOv">Contact</a>
    </nav>

    <div class="site-header__actions">
      <a class="site-header__cta" href="https://sites.leadconnectorhq.com/preview/1hKUnDgy89s5HG7MLgOv">Get a Free Quote</a>
    </div>

    <button class="site-header__menu" type="button" aria-label="Toggle menu" aria-expanded="false" data-site-menu>
      <span class="site-header__menu-icon" aria-hidden="true"></span>
    </button>

  </div>

  <!-- Mobile slide-down panel -->
  <div class="site-header__panel" data-site-panel aria-hidden="true">
    <nav class="site-header__panel-nav" data-site-panel-nav aria-label="Mobile navigation">
      <a href="https://sites.leadconnectorhq.com/preview/ZRjI0b0dRrtS1rWmfXck">Home <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></a>
      <a href="https://sites.leadconnectorhq.com/preview/7Khaj4g1PF6rklNUDMKk">About <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></a>
      <a href="https://sites.leadconnectorhq.com/preview/RR3e8lpguyVaawDedxJ2">Services <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></a>
      <a href="https://sites.leadconnectorhq.com/preview/Yfsl5wGaeXydse247kvx">Gallery <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></a>
      <a href="https://sites.leadconnectorhq.com/preview/1hKUnDgy89s5HG7MLgOv">Contact <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></a>
    </nav>
    <div class="site-header__panel-cta">
      <a href="https://sites.leadconnectorhq.com/preview/1hKUnDgy89s5HG7MLgOv">Get a Free Quote</a>
    </div>
  </div>
</header>

<script>
  (() => {
    const header   = document.querySelector("[data-site-header]");
    const menu     = document.querySelector("[data-site-menu]");
    const panel    = document.querySelector("[data-site-panel]");
    if (!header || !menu) return;

    menu.addEventListener("click", () => {
      const isOpen = header.classList.toggle("is-open");
      menu.setAttribute("aria-expanded", String(isOpen));
      if (panel) panel.setAttribute("aria-hidden", String(!isOpen));
    });

    /* Close panel when a mobile nav link is tapped */
    if (panel) {
      panel.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          header.classList.remove("is-open");
          menu.setAttribute("aria-expanded", "false");
          panel.setAttribute("aria-hidden", "true");
        });
      });
    }

    /* Mark active link in both desktop nav and mobile panel */
    const path = window.location.pathname.replace(/\/$/, "") || "/";
    header.querySelectorAll(".site-header__nav a, [data-site-panel-nav] a").forEach((link) => {
      const href = link.getAttribute("href").replace(/\/$/, "") || "/";
      if (href === path) link.classList.add("is-active");
    });
  })();
</script>
